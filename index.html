    const firebaseConfig = {

    const db = getFirestore(app);

    const tripDocId = 'fukuoka_trip_2026';

    const CatAvatar = ({ type, size = 60 }) => {
      const draw = () => {
        switch(type) {
          case 'calico':
            return (
              <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="50" fill="#E8B4A2" />

                <circle cx="40" cy="58" r="3.5" fill="#333" /><circle cx="60" cy="58" r="3.5" fill="#333" />

            return <circle cx="50" cy="50" r="50" fill="#D5D8DC" />;

      return <div style={{ width: size, height: size }} className="rounded-full overflow-hidden shadow-sm bg-white flex-shrink-0">{draw()}</div>;
    };

    const initialData = {
      exchangeRate: 0.215,
      itinerary: {
        1: { date: '6/09 (二)', desc: '抵達福岡', events: [ { time: '15:10', title: '桃園機場 出發', type: '航班', color: '#F1948A', location: '桃園國際機場' }, { time: '18:20', title: '機場到著', type: '抵達', color: '#8BA18E', location: '福岡機場' }, { time: '19:30', title: 'AYA HOTELS 博多 1st Check-in', type: '住宿', color: '#A6808C', location: 'AYA HOTELS博多1st' }, { time: '20:30', title: '晚餐', type: '美食', color: '#F1C40F', location: '博多' } ] },
        2: { date: '6/10 (三)', desc: '太宰府・天神', events: [ { time: '09:00', title: '筥崎宮紫陽花園', type: '景點', color: '#8BA18E', location: '筥崎宮' }, { time: '11:00', title: '太宰府', type: '景點', color: '#8BA18E', location: '太宰府天滿宮' }, { time: '12:30', title: '梅枝餅', type: '美食', color: '#F1C40F', location: '太宰府' }, { time: '14:00', title: '天神或博多運河城血拼', type: '購物', color: '#A6808C', location: '天神' }, { time: '18:30', title: '博多水炊雞肉鍋：阿吽舞鶴店', type: '美食', color: '#F1C40F', location: '阿吽 舞鶴店' } ] },
        3: { date: '6/11 (四)', desc: '糸島・宮地嶽', events: [ { time: '09:30', title: '糸島櫻井二見浦 夫婦岩', type: '景點', color: '#8BA18E', location: '櫻井二見浦' }, { time: '11:30', title: '芥屋大門公園：龍貓森林步道', type: '景點', color: '#8BA18E', location: '芥屋大門公園' }, { time: '13:00', title: '糸島海鮮堂', type: '美食', color: '#F1C40F', location: '糸島海鮮堂' }, { time: '14:30', title: '手工花鹽布丁 またいちの塩', type: '美食', color: '#F1C40F', location: 'またいちの塩' }, { time: '16:00', title: '宮地嶽', type: '景點', color: '#8BA18E', location: '宮地嶽神社' } ] },
        4: { date: '6/12 (五)', desc: '由布院散策', events: [ { time: '09:00', title: '由布院・湯布院', type: '景點', color: '#8BA18E', location: '湯布院' }, { time: '11:00', title: '金鱗湖', type: '景點', color: '#8BA18E', location: '金鱗湖' }, { time: '12:30', title: '豐後牛釜飯', type: '美食', color: '#F1C40F', location: '由布院' }, { time: '15:30', title: '返回博多', type: '交通', color: '#F1948A', location: '博多車站' }, { time: '18:30', title: '居酒屋 海風土：500円生魚片珠寶盒', type: '美食', color: '#F1C40F', location: '海風土' } ] },
        5: { date: '6/13 (六)', desc: '博多市區觀光', events: [ { time: '10:00', title: '八幡宮', type: '景點', color: '#8BA18E', location: '八幡宮' }, { time: '13:00', title: '天神購物', type: '購物', color: '#A6808C', location: '天神' }, { time: '18:00', title: '博多運河城', type: '購物', color: '#A6808C', location: '博多運河城' } ] },
        6: { date: '6/14 (日)', desc: '最後衝刺', events: [ { time: '10:00', title: '天神購物', type: '購物', color: '#A6808C', location: '天神' }, { time: '14:00', title: '博多運河城', type: '購物', color: '#A6808C', location: '博多運河城' }, { time: '19:20', title: '福岡機場 起飛', type: '航班', color: '#F1948A', location: '福岡國際機場' } ] },
        7: { date: '6/15 (一)', desc: '平安歸家', events: [ { time: '08:00', title: '整理照片與回憶', type: '景點', color: '#8BA18E', location: '家' } ] }
      },
      checklist: [ { id: 1, text: '填寫 VJW 快速通關', checked: true }, { id: 2, text: '辦理國際駕照', checked: true }, { id: 3, text: '日幣換匯', checked: false } ],
      wishlist: [ { id: 1, name: '茅乃舍 湯頭包', userId: 1, amount: '¥2,500', checked: false }, { id: 2, name: '獺祭 三割九分', userId: 2, amount: '¥5,600', checked: true }, { id: 3, name: 'Yojiya 護手霜', userId: 3, amount: '¥1,200', checked: false } ],
      expenses: [ { id: 1, name: '博多水炊雞肉鍋 (3份)', userId: 1, amount: 9800, date: '6/10', tag: '美食' }, { id: 2, name: '糸島租車費', userId: 2, amount: 12000, date: '6/11', tag: '交通' }, { id: 3, name: '一蘭拉麵', userId: 3, amount: 3300, date: '6/12', tag: '美食' }, { id: 4, name: '超商零食', userId: 1, amount: 1500, date: '6/10', tag: '美食' } ]
    };

    function App() {
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [isDataLoading, setIsDataLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState('connecting');

      const [activeTab, setActiveTab] = useState('itinerary');
      const [prepareSubTab, setPrepareSubTab] = useState('checklist'); 
      const [walletSubTab, setWalletSubTab] = useState('details'); 
      const [bookingSubTab, setBookingSubTab] = useState('flight');
      const [selectedDay, setSelectedDay] = useState(1);
      const [expandedItem, setExpandedItem] = useState(null);
      
      const [draggedIdx, setDraggedIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);

      const [exchangeRate, setExchangeRate] = useState(0.215);
      const [calcJpy, setCalcJpy] = useState('');
      const [calcTwd, setCalcTwd] = useState('');

      const [members] = useState([
        { id: 1, name: '品瑜', avatar: 'calico' },
        { id: 2, name: '奕婷', avatar: 'gray-tabby' },
        { id: 3, name: '阿嫻', avatar: 'fad7a' },
      ]);

      const [itineraryData, setItineraryData] = useState({});
      const [checklist, setChecklist] = useState([]);
      const [wishlist, setWishlist] = useState([]);
      const [expenses, setExpenses] = useState([]);

      useEffect(() => {
        let isMounted = true;
        signInAnonymously(auth)
          .then(() => {
            if(isMounted) setIsAuthLoading(false);
          })
          .catch((error) => {
            console.error("Auth Error:", error);
            if(isMounted) {
              setSyncStatus('error');
              setIsAuthLoading(false);
            }
          });
        return () => { isMounted = false; };
      }, []);

      useEffect(() => {
        if (isAuthLoading) return;

        const docRef = doc(db, 'trips', tripDocId);
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
             const data = docSnap.data();
             setItineraryData(data.itinerary || {});
             setChecklist(data.checklist || []);
             setWishlist(data.wishlist || []);
             setExpenses(data.expenses || []);
             if(data.exchangeRate) setExchangeRate(data.exchangeRate);
             setSyncStatus('online');
             setIsDataLoading(false);
          } else {
             setItineraryData(initialData.itinerary);
             setChecklist(initialData.checklist);
             setWishlist(initialData.wishlist);
             setExpenses(initialData.expenses);
             
             setDoc(docRef, initialData).then(() => {
                setSyncStatus('online');
                setIsDataLoading(false);
             }).catch(e => {
                console.error("Init Error", e);
                setSyncStatus('error');
                setIsDataLoading(false);
             });
          }
        }, (err) => {
          console.error("Snapshot error:", err);
          setSyncStatus('error');
          setItineraryData(prev => Object.keys(prev).length ? prev : initialData.itinerary);
          setChecklist(prev => prev.length ? prev : initialData.checklist);
          setWishlist(prev => prev.length ? prev : initialData.wishlist);
          setExpenses(prev => prev.length ? prev : initialData.expenses);
          setIsDataLoading(false); 
        });

        return () => unsubscribe();
      }, [isAuthLoading]);

      const saveToCloud = async (field, data) => {
        try {
          const docRef = doc(db, 'trips', tripDocId);
          await updateDoc(docRef, { [field]: data });
        } catch (e) {
          console.error("Save Error:", e);
        }
      };

      const totalYen = expenses.reduce((s, e) => s + e.amount, 0);

      const [showAddEvent, setShowAddEvent] = useState(false);
      const [newEvent, setNewEvent] = useState({ time: '10:00', title: '', type: '景點', location: '' });

      const [newChecklistText, setNewChecklistText] = useState('');

      const [showAddWishlist, setShowAddWishlist] = useState(false);
      const [newWishlist, setNewWishlist] = useState({ name: '', amount: '', userId: 1 });

      const [showAddExpense, setShowAddExpense] = useState(false);
      const [newExpense, setNewExpense] = useState({ name: '', amount: '', userId: 1, tag: '美食' });

      const openGoogleMap = (query) => {
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`, '_blank');
      };

      const handleJpyChange = (val) => {
        setCalcJpy(val);
        if (val === '') setCalcTwd('');
        else setCalcTwd((parseFloat(val) * exchangeRate).toFixed(0));
      };

      const handleTwdChange = (val) => {
        setCalcTwd(val);
        if (val === '') setCalcJpy('');
        else setCalcJpy((parseFloat(val) / exchangeRate).toFixed(0));
      };

      const handleExchangeRateChange = (val) => {
        const newRate = parseFloat(val) || 0;
        setExchangeRate(newRate);
        saveToCloud('exchangeRate', newRate);
      };

      const handleDragStart = (e, index) => { setDraggedIdx(index); setExpandedItem(null); };
      const handleDragEnter = (e, index) => { e.preventDefault(); setDragOverIdx(index); };
      const handleDragEnd = () => { setDraggedIdx(null); setDragOverIdx(null); };
      const handleDragOver = (e) => e.preventDefault();
      
      const handleDrop = (e) => {
        e.preventDefault();
        if (draggedIdx !== null && dragOverIdx !== null && draggedIdx !== dragOverIdx) {
          const currentEvents = [...(itineraryData[selectedDay]?.events || [])];
          const draggedEvent = currentEvents[draggedIdx];
          currentEvents.splice(draggedIdx, 1);
          currentEvents.splice(dragOverIdx, 0, draggedEvent);
          
          const newItinerary = { ...itineraryData, [selectedDay]: { ...itineraryData[selectedDay], events: currentEvents } };
          setItineraryData(newItinerary); 
          saveToCloud('itinerary', newItinerary); 
        }
        setDraggedIdx(null);
        setDragOverIdx(null);
      };

      const getEventColor = (type) => {
        switch(type) {
          case '美食': return '#F1C40F';
          case '購物': return '#A6808C';
          case '交通': case '航班': return '#F1948A';
          case '住宿': return '#A6808C';
          default: return '#8BA18E';
        }
      };

      const handleAddEvent = () => {
        if(!newEvent.title) return;
        const currentEvents = [...(itineraryData[selectedDay]?.events || [])];
        currentEvents.push({ ...newEvent, color: getEventColor(newEvent.type) });
        currentEvents.sort((a, b) => a.time.localeCompare(b.time));
        
        const newItinerary = { ...itineraryData, [selectedDay]: { ...itineraryData[selectedDay], events: currentEvents } };
        setItineraryData(newItinerary);
        saveToCloud('itinerary', newItinerary);
        
        setShowAddEvent(false);
        setNewEvent({ time: '10:00', title: '', type: '景點', location: '' });
      };

      const toggleChecklist = (id) => {
        const newChecklist = checklist.map(item => item.id === id ? { ...item, checked: !item.checked } : item);
        setChecklist(newChecklist);
        saveToCloud('checklist', newChecklist);
      };

      const handleAddChecklist = () => {
        if(!newChecklistText.trim()) return;
        const newChecklist = [...checklist, { id: Date.now(), text: newChecklistText, checked: false }];
        setChecklist(newChecklist);
        saveToCloud('checklist', newChecklist);
        setNewChecklistText('');
      };

      const toggleWishlist = (id) => {
        const newWishlist = wishlist.map(item => item.id === id ? { ...item, checked: !item.checked } : item);
        setWishlist(newWishlist);
        saveToCloud('wishlist', newWishlist);
      };

      const handleAddWishlist = () => {
        if(!newWishlist.name) return;
        const newWishlistData = [...wishlist, { ...newWishlist, id: Date.now(), amount: newWishlist.amount.includes('¥') ? newWishlist.amount : `¥${newWishlist.amount}`, checked: false }];
        setWishlist(newWishlistData);
        saveToCloud('wishlist', newWishlistData);
        setShowAddWishlist(false);
        setNewWishlist({ name: '', amount: '', userId: 1 });
      };

      const handleAddExpense = () => {
        if(!newExpense.name || !newExpense.amount) return;
        const expenseDate = itineraryData[selectedDay]?.date?.split(' ')[0] || `6/${8+selectedDay}`;
        const newExpenses = [...expenses, { ...newExpense, id: Date.now(), amount: parseInt(newExpense.amount), date: expenseDate }];
        setExpenses(newExpenses);
        saveToCloud('expenses', newExpenses);
        setShowAddExpense(false);
        setNewExpense({ name: '', amount: '', userId: 1, tag: '美食' });
      };

      const handleDeleteEvent = (e, day, idx) => {
        e.stopPropagation();
        const currentEvents = [...(itineraryData[day]?.events || [])];
        currentEvents.splice(idx, 1);
        const newItinerary = { ...itineraryData, [day]: { ...itineraryData[day], events: currentEvents } };
        setItineraryData(newItinerary);
        saveToCloud('itinerary', newItinerary);
        setExpandedItem(null);
      };

      const handleDeleteChecklist = (e, id) => {
        e.stopPropagation();
        const newChecklist = checklist.filter(item => item.id !== id);
        setChecklist(newChecklist);
        saveToCloud('checklist', newChecklist);
      };

      const handleDeleteWishlist = (e, id) => {
        e.stopPropagation();
        const newWishlistData = wishlist.filter(item => item.id !== id);
        setWishlist(newWishlistData);
        saveToCloud('wishlist', newWishlistData);
      };

      const handleDeleteExpense = (e, id) => {
        e.stopPropagation();
        const newExpenses = expenses.filter(item => item.id !== id);
        setExpenses(newExpenses);
        saveToCloud('expenses', newExpenses);
      };

      if (isAuthLoading || isDataLoading) {
        return (
          <div className="min-h-screen bg-[#F5F4EA] flex flex-col items-center justify-center gap-4">
            <div className="w-12 h-12 border-4 border-[#8BA68D] border-t-transparent rounded-full animate-spin"></div>
            <p className="text-[#8BA68D] font-black tracking-widest text-sm animate-pulse">正在準備放飛畫布...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-24 max-w-md mx-auto relative bg-[#F5F4EA] text-[#5C5446] font-sans overflow-x-hidden">
          <div className="absolute inset-0 opacity-[0.08] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#5C5446 1.5px, transparent 1.5px)', backgroundSize: '20px 20px' }}></div>

          <header className="pt-8 px-6 pb-2 relative z-10">
            <div className="flex justify-between items-center mb-1">

                     <div className="flex items-center gap-3"><Calendar size={16} className="text-[#A69E83]" /><p>入住：6/09 - 6/15 (6晚)</p></div>
                  </div>
                </div>
              </div>
            ) : null}

            {activeTab === 'members' && (
              <div className="space-y-6 animate-in fade-in duration-300">
                <div className="bg-[#8BA68D] rounded-[2.5rem] p-8 text-white text-center"><h3 className="text-2xl font-black mb-1">同行旅伴</h3><p className="text-[11px] font-bold opacity-80">放飛小組共 {members.length} 人</p></div>
                <div className="grid grid-cols-2 gap-4">
                  {members.map((m) => (<div key={m.id} className="bg-white rounded-[2.5rem] p-6 flex flex-col items-center border border-white shadow-sm"><CatAvatar type={m.avatar} size={75} /><h5 className="font-black mt-4 text-[15px] text-[#4A4439]">{m.name}</h5></div>))}
                </div>
              </div>
            )}
          </main>

          {/* === 新增表單 Modals === */}
          {showAddEvent && (
            <div className="fixed inset-0 bg-[#5C5446]/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
               <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-xl animate-in fade-in zoom-in-95 duration-200">
                 <div className="flex justify-between items-center mb-5">
                   <h3 className="font-black text-[#4A4439]">新增 Day {selectedDay} 行程</h3>
                   <button onClick={() => setShowAddEvent(false)} className="text-[#A69E83] p-1 bg-[#F5F4EA] rounded-full hover:bg-slate-100"><X size={16}/></button>
                 </div>
                 <div className="space-y-4">
                    <div><label className="text-[10px] font-bold text-[#A69E83] block mb-1">時間</label><input type="time" value={newEvent.time} onChange={e => setNewEvent({...newEvent, time: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]" /></div>
                    <div><label className="text-[10px] font-bold text-[#A69E83] block mb-1">行程名稱 (必填)</label><input type="text" placeholder="例如：逛天神地下街" value={newEvent.title} onChange={e => setNewEvent({...newEvent, title: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]" /></div>
                    <div><label className="text-[10px] font-bold text-[#A69E83] block mb-1">類型</label><select value={newEvent.type} onChange={e => setNewEvent({...newEvent, type: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]"><option value="景點">景點</option><option value="美食">美食</option><option value="購物">購物</option><option value="交通">交通</option></select></div>
                    <div><label className="text-[10px] font-bold text-[#A69E83] block mb-1">地點關鍵字 (供 Google Maps 搜尋)</label><input type="text" placeholder="例如：Tenjin Underground Shopping Center" value={newEvent.location} onChange={e => setNewEvent({...newEvent, location: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]" /></div>
                    <button onClick={handleAddEvent} className="w-full bg-[#8BA68D] text-white font-black py-3 rounded-xl mt-2 hover:bg-[#7a957c] active:scale-95 transition-all">確認新增</button>
                 </div>
               </div>
            </div>
          )}

          {showAddWishlist && (
            <div className="fixed inset-0 bg-[#5C5446]/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
               <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-xl animate-in fade-in zoom-in-95 duration-200">
                 <div className="flex justify-between items-center mb-5">
                   <h3 className="font-black text-[#4A4439]">新增想買清單</h3>
                   <button onClick={() => setShowAddWishlist(false)} className="text-[#A69E83] p-1 bg-[#F5F4EA] rounded-full hover:bg-slate-100"><X size={16}/></button>
                 </div>
                 <div className="space-y-4">
                    <div><label className="text-[10px] font-bold text-[#A69E83] block mb-1">物品名稱 (必填)</label><input type="text" placeholder="例如：雪肌精防曬" value={newWishlist.name} onChange={e => setNewWishlist({...newWishlist, name: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]" /></div>
                    <div><label className="text-[10px] font-bold text-[#A69E83] block mb-1">預估金額 (日幣)</label><input type="text" placeholder="例如：2500" value={newWishlist.amount} onChange={e => setNewWishlist({...newWishlist, amount: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]" /></div>
                    <div><label className="text-[10px] font-bold text-[#A69E83] block mb-1">許願者</label><select value={newWishlist.userId} onChange={e => setNewWishlist({...newWishlist, userId: Number(e.target.value)})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]">{members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
                    <button onClick={handleAddWishlist} className="w-full bg-[#8BA68D] text-white font-black py-3 rounded-xl mt-2 hover:bg-[#7a957c] active:scale-95 transition-all">確認新增</button>
                 </div>
               </div>
            </div>
          )}

          {showAddExpense && (
            <div className="fixed inset-0 bg-[#5C5446]/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
               <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-xl animate-in fade-in zoom-in-95 duration-200">
                 <div className="flex justify-between items-center mb-5">
                   <h3 className="font-black text-[#4A4439]">新增共同支出</h3>
                   <button onClick={() => setShowAddExpense(false)} className="text-[#A69E83] p-1 bg-[#F5F4EA] rounded-full hover:bg-slate-100"><X size={16}/></button>
                 </div>
                 <div className="space-y-4">
                    <div><label className="text-[10px] font-bold text-[#A69E83] block mb-1">支出名稱 (必填)</label><input type="text" placeholder="例如：計程車資" value={newExpense.name} onChange={e => setNewExpense({...newExpense, name: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]" /></div>
                    <div><label className="text-[10px] font-bold text-[#A69E83] block mb-1">金額 (日幣 ¥ - 必填)</label><input type="number" placeholder="例如：1500" value={newExpense.amount} onChange={e => setNewExpense({...newExpense, amount: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]" /></div>
                    <div className="flex gap-3">
                       <div className="flex-1"><label className="text-[10px] font-bold text-[#A69E83] block mb-1">代付者</label><select value={newExpense.userId} onChange={e => setNewExpense({...newExpense, userId: Number(e.target.value)})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]">{members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
                       <div className="flex-1"><label className="text-[10px] font-bold text-[#A69E83] block mb-1">類別</label><select value={newExpense.tag} onChange={e => setNewExpense({...newExpense, tag: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-[#8BA68D]"><option value="美食">美食</option><option value="交通">交通</option><option value="購物">購物</option><option value="門票">門票</option><option value="其他">其他</option></select></div>
                    </div>
                    <button onClick={handleAddExpense} className="w-full bg-[#F1C40F] text-white font-black py-3 rounded-xl mt-2 hover:bg-[#d4ac0d] active:scale-95 transition-all">確認新增</button>
                 </div>
               </div>
            </div>
          )}

          <nav className="fixed bottom-4 left-4 right-4 bg-white/95 backdrop-blur-md rounded-[2.5rem] px-6 py-3 flex justify-between items-center shadow-xl border border-white/50 max-w-[calc(448px-2rem)] mx-auto z-[100]">
            <NavBtn icon={<Calendar size={20}/>} label="行程" active={activeTab === 'itinerary'} onClick={() => setActiveTab('itinerary')} />
            <NavBtn icon={<ClipboardList size={20}/>} label="準備" active={activeTab === 'prepare'} onClick={() => setActiveTab('prepare')} />
            <NavBtn icon={<Wallet size={20}/>} label="記帳" active={activeTab === 'wallet'} onClick={() => setActiveTab('wallet')} />
            <NavBtn icon={<Ticket size={20}/>} label="預訂" active={activeTab === 'booking'} onClick={() => setActiveTab('booking')} />
            <NavBtn icon={<Users size={20}/>} label="成員" active={activeTab === 'members'} onClick={() => setActiveTab('members')} />
          </nav>
        </div>
      );
    }

    const NavBtn = ({ icon, label, active, onClick }) => (
      <button onClick={onClick} className={`flex flex-col items-center gap-1.5 p-1 transition-all duration-300 ${active ? 'text-[#8BA68D] scale-110' : 'text-[#A69E83] opacity-70 hover:opacity-100'}`}>
        <div className={`p-1.5 rounded-xl ${active ? 'bg-[#8BA68D]/10' : ''}`}>{icon}</div>
        <span className="text-[10px] font-black">{label}</span>
      </button>
    );

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);

    // Register Service Worker for PWA support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => {
            console.log('Service Worker registered:', reg);
          })
          .catch(err => {
            console.log('Service Worker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
