<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>福岡放飛</title>
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="福岡放飛">
  <meta name="theme-color" content="#F5F4EA">
  
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%238BA68D%22/><text x=%2250%22 y=%2265%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2235%22 text-anchor=%22middle%22 fill=%22white%22>福岡</text></svg>">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%238BA68D%22/><text x=%2250%22 y=%2265%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2235%22 text-anchor=%22middle%22 fill=%22white%22>福岡</text></svg>">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { -webkit-tap-highlight-color: transparent; }
    main { padding-bottom: env(safe-area-inset-bottom); }
    nav { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }
  </style>
</head>
<body class="bg-[#F5F4EA] antialiased overscroll-none selection:bg-[#8BA68D] selection:text-white">
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ChevronLeft, Calendar, ClipboardList, Wallet, Ticket, Users, 
      ChevronDown, Sun, Plus, Plane, Building2, Check, Search, Bell, 
      ShoppingBag, PieChart, List, MapPin, ExternalLink, Navigation, 
      RefreshCw, ArrowRightLeft, GripVertical, X, Trash2, Cloud, Download
    } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from 'firebase/firestore';
    import { getAuth, signInAnonymously } from 'firebase/auth';

    const firebaseConfig = {
      apiKey: "AIzaSyAnTochapvOduAzEjFIKrBFa2HLNkJ6_-I",
      authDomain: "my-fukuoka.firebaseapp.com",
      projectId: "my-fukuoka",
      storageBucket: "my-fukuoka.firebasestorage.app",
      messagingSenderId: "195946210198",
      appId: "1:195946210198:web:6b4dac1747e28d743933b7",
      measurementId: "G-Y67WDKPRD2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const tripDocId = 'fukuoka_trip_2026';

    const CatAvatar = ({ type, size = 60 }) => {
      const draw = () => {
        switch(type) {
          case 'calico':
            return (
              <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="50" fill="#E8B4A2" /><path d="M25 40 L30 20 L45 32 Z" fill="#555" /><path d="M75 40 L70 20 L55 32 Z" fill="#E67E22" /><path d="M20 60 Q20 30 50 30 Q80 30 80 60 Q80 85 50 85 Q20 85 20 60" fill="white" /><path d="M20 60 Q20 30 50 30 Q50 45 35 50 Q20 50 20 60 Z" fill="#555" /><path d="M80 60 Q80 30 50 30 Q50 45 65 50 Q80 50 80 60 Z" fill="#E67E22" /><path d="M25 60 L10 55 M25 65 L10 65 M25 70 L10 75 M75 60 L90 55 M75 65 L90 65 M75 70 L90 75" stroke="#333" strokeWidth="1.5" strokeLinecap="round" /><circle cx="40" cy="58" r="3.5" fill="#333" /><circle cx="60" cy="58" r="3.5" fill="#333" /><circle cx="50" cy="66" r="2" fill="#333" />
              </svg>
            );
          case 'gray-tabby':
            return (
              <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="50" fill="#E8B4A2" /><path d="M25 40 L30 20 L45 32 Z" fill="#7F8C8D" /><path d="M75 40 L70 20 L55 32 Z" fill="#7F8C8D" /><path d="M20 60 Q20 30 50 30 Q80 30 80 60 Q80 85 50 85 Q20 85 20 60" fill="#7F8C8D" /><path d="M35 65 Q50 55 65 65 Q65 80 50 85 Q35 80 35 65 Z" fill="white" /><path d="M50 30 L50 40 M40 32 L45 42 M60 32 L55 42" stroke="#34495E" strokeWidth="3" strokeLinecap="round" /><path d="M25 60 L10 55 M25 65 L10 65 M25 70 L10 75 M75 60 L90 55 M75 65 L90 65 M75 70 L90 75" stroke="#333" strokeWidth="1.5" strokeLinecap="round" /><circle cx="40" cy="58" r="3.5" fill="#333" /><circle cx="60" cy="58" r="3.5" fill="#333" /><circle cx="50" cy="66" r="2" fill="#333" />
              </svg>
            );
          case 'fad7a':
            return (
              <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="50" fill="#E8B4A2" /><path d="M25 40 L30 20 L45 32 Z" fill="#FAD7A1" /><path d="M75 40 L70 20 L55 32 Z" fill="#FAD7A1" /><path d="M20 60 Q20 30 50 30 Q80 30 80 60 Q80 85 50 85 Q20 85 20 60" fill="#FAD7A1" /><path d="M35 65 Q50 55 65 65 Q65 80 50 85 Q35 80 35 65 Z" fill="white" /><path d="M50 30 L50 40 M40 32 L45 42 M60 32 L55 42" stroke="#E67E22" strokeWidth="3" strokeLinecap="round" /><path d="M25 60 L10 55 M25 65 L10 65 M25 70 L10 75 M75 60 L90 55 M75 65 L90 65 M75 70 L90 75" stroke="#333" strokeWidth="1.5" strokeLinecap="round" /><circle cx="40" cy="58" r="3.5" fill="#333" /><circle cx="60" cy="58" r="3.5" fill="#333" /><circle cx="50" cy="66" r="2" fill="#333" />
              </svg>
            );
          default:
            return <circle cx="50" cy="50" r="50" fill="#D5D8DC" />;
        }
      };
      return <div style={{ width: size, height: size }} className="rounded-full overflow-hidden shadow-sm bg-white flex-shrink-0">{draw()}</div>;
    };

    function App() {
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [isDataLoading, setIsDataLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState('connecting');
      const [lastSyncTime, setLastSyncTime] = useState(null);

      const [activeTab, setActiveTab] = useState('itinerary');
      const [prepareSubTab, setPrepareSubTab] = useState('checklist'); 
      const [walletSubTab, setWalletSubTab] = useState('details'); 
      const [bookingSubTab, setBookingSubTab] = useState('flight');
      const [selectedDay, setSelectedDay] = useState(1);
      const [expandedItem, setExpandedItem] = useState(null);
      
      const [exchangeRate, setExchangeRate] = useState(0.215);
      const [calcJpy, setCalcJpy] = useState('');
      const [calcTwd, setCalcTwd] = useState('');

      const [members] = useState([
        { id: 1, name: '品瑜', avatar: 'calico' },
        { id: 2, name: '奕婷', avatar: 'gray-tabby' },
        { id: 3, name: '阿嫻', avatar: 'fad7a' },
      ]);

      const [fullData, setFullData] = useState({});
      const [itineraryData, setItineraryData] = useState({});
      const [checklist, setChecklist] = useState([]);
      const [wishlist, setWishlist] = useState([]);
      const [expenses, setExpenses] = useState([]);

      useEffect(() => {
        signInAnonymously(auth).then(() => setIsAuthLoading(false)).catch(e => {
          console.error("Auth Error:", e);
          setIsAuthLoading(false);
          setSyncStatus('error');
        });
      }, []);

      useEffect(() => {
        if (isAuthLoading) return;
        const docRef = doc(db, 'trips', tripDocId);
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
             const data = docSnap.data();
             setFullData(data); // 儲存完整資料供備份使用
             setItineraryData(data.itinerary || {});
             setChecklist(data.checklist || []);
             setWishlist(data.wishlist || []);
             setExpenses(data.expenses || []);
             if(data.exchangeRate) setExchangeRate(data.exchangeRate);
             setSyncStatus('online');
             setLastSyncTime(new Date().toLocaleTimeString());
             setIsDataLoading(false);
          } else {
             // 重要：如果文件不見了，不主動重置，讓使用者知道狀態
             setSyncStatus('not-found');
             setIsDataLoading(false);
          }
        }, (err) => {
          console.error("Firestore Error:", err);
          setSyncStatus('error');
          setIsDataLoading(false); 
        });

        return () => unsubscribe();
      }, [isAuthLoading]);

      // 安全更新函式：使用 Dot Notation
      const safeSave = async (field, data) => {
        try {
          const docRef = doc(db, 'trips', tripDocId);
          // 只更新特定的欄位，並加上最後更新紀錄
          await updateDoc(docRef, { 
            [field]: data,
            "meta.lastUpdated": new Date().getTime(),
            "meta.updatedBy": auth.currentUser ? auth.currentUser.uid : 'anon'
          });
          setSyncStatus('online');
        } catch (e) {
          console.error("Save Error:", e);
          setSyncStatus('error');
          alert("同步失敗，請檢查網路或權限！資料可能未成功儲存。");
        }
      };

      // 匯出備份功能
      const exportBackup = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(fullData, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `fukuoka_backup_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
      };

      const totalYen = expenses.reduce((s, e) => s + e.amount, 0);

      const [showAddEvent, setShowAddEvent] = useState(false);
      const [newEvent, setNewEvent] = useState({ time: '10:00', title: '', type: '景點', location: '' });
      const [showAddWishlist, setShowAddWishlist] = useState(false);
      const [newWishlist, setNewWishlist] = useState({ name: '', amount: '', userId: 1 });
      const [showAddExpense, setShowAddExpense] = useState(false);
      const [newExpense, setNewExpense] = useState({ name: '', amount: '', userId: 1, tag: '美食' });

      // 事件處理
      const handleAddEvent = () => {
        if(!newEvent.title) return;
        const currentEvents = [...(itineraryData[selectedDay]?.events || [])];
        const colors = { '美食': '#F1C40F', '購物': '#A6808C', '交通': '#F1948A', '航班': '#F1948A', '住宿': '#A6808C' };
        currentEvents.push({ ...newEvent, color: colors[newEvent.type] || '#8BA18E' });
        currentEvents.sort((a, b) => a.time.localeCompare(b.time));
        const newItinerary = { ...itineraryData, [selectedDay]: { ...itineraryData[selectedDay], events: currentEvents } };
        setItineraryData(newItinerary);
        safeSave('itinerary', newItinerary);
        setShowAddEvent(false);
      };

      const toggleChecklist = (id) => {
        const newData = checklist.map(item => item.id === id ? { ...item, checked: !item.checked } : item);
        setChecklist(newData);
        safeSave('checklist', newData);
      };

      const handleAddExpense = () => {
        if(!newExpense.name || !newExpense.amount) return;
        const expenseDate = itineraryData[selectedDay]?.date?.split(' ')[0] || `6/${8+selectedDay}`;
        const newData = [...expenses, { ...newExpense, id: Date.now(), amount: parseInt(newExpense.amount), date: expenseDate }];
        setExpenses(newData);
        safeSave('expenses', newData);
        setShowAddExpense(false);
      };

      if (isAuthLoading || isDataLoading) {
        return (
          <div className="min-h-screen bg-[#F5F4EA] flex flex-col items-center justify-center gap-4">
            <div className="w-12 h-12 border-4 border-[#8BA68D] border-t-transparent rounded-full animate-spin"></div>
            <p className="text-[#8BA68D] font-black tracking-widest text-sm animate-pulse">正在安全連線中...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-24 max-w-md mx-auto relative bg-[#F5F4EA] text-[#5C5446] font-sans overflow-x-hidden">
          <div className="absolute inset-0 opacity-[0.08] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#5C5446 1.5px, transparent 1.5px)', backgroundSize: '20px 20px' }}></div>

          <header className="pt-8 px-6 pb-2 relative z-10">
            <div className="flex justify-between items-center mb-1">
              <div className="flex items-center gap-2">
                <ChevronLeft size={20} className="text-[#8B8678]" />
                <h1 className="text-xl font-black tracking-tight text-[#4A4439]">福岡放飛自由行</h1>
              </div>
              <div className="flex items-center gap-3">
                 <Search size={20} className="text-[#8B8678]" />
                 <Bell size={20} className="text-[#8B8678]" />
              </div>
            </div>
            <div className="flex justify-between items-center ml-1 mt-2">
               <p className="text-[10px] text-[#A69E83] font-bold uppercase tracking-wider">2026/06/09 - 06/15</p>
               <div className={`flex items-center gap-1 text-[9px] font-bold px-2 py-0.5 rounded-full ${syncStatus === 'online' ? 'bg-[#8BA68D]/10 text-[#8BA68D]' : 'bg-red-100 text-red-500'}`}>
                 <Cloud size={10} />
                 {syncStatus === 'online' ? `已同步 ${lastSyncTime}` : '同步異常'}
               </div>
            </div>
          </header>

          <main className="relative z-10 px-4 pt-2">
            {activeTab === 'itinerary' && (
              <div className="space-y-4 animate-in fade-in duration-300">
                <div className="bg-white/70 backdrop-blur rounded-[2rem] p-5 shadow-sm border border-white/50 flex justify-between items-center">
                  <div className="flex gap-3 items-center">
                     <div className="bg-white p-2.5 rounded-2xl shadow-sm"><Sun className="text-yellow-500" size={26} /></div>
                     <div>
                       <h3 className="font-black text-[15px]">Day {selectedDay} - {itineraryData[selectedDay]?.desc || '未命名'}</h3>
                       <p className="text-[10px] font-bold text-[#A69E83]">{itineraryData[selectedDay]?.date || ''}</p>
                     </div>
                  </div>
                  <div className="text-right"><span className="text-[13px] font-black block text-[#8BA68D]">晴朗</span><span className="text-[10px] font-bold text-[#A69E83]">24° / 18°</span></div>
                </div>
                <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                  {[1, 2, 3, 4, 5, 6, 7].map(d => (
                    <button key={d} onClick={() => {setSelectedDay(d); setExpandedItem(null);}} className={`flex-shrink-0 w-[4.5rem] py-3 rounded-2xl flex flex-col items-center transition-all border ${selectedDay === d ? 'bg-[#8BA68D] text-white border-[#8BA68D] shadow-md' : 'bg-white text-[#A69E83] border-slate-50'}`}><span className="text-[9px] font-bold opacity-80 uppercase">Day {d}</span><span className="text-xs font-black">6/{8+d}</span></button>
                  ))}
                </div>
                <div className="flex justify-end pr-2">
                  <button onClick={() => setShowAddEvent(true)} className="flex items-center gap-1.5 bg-[#8BA68D] text-white px-3 py-1.5 rounded-full text-[11px] font-bold shadow-sm hover:scale-105 transition-transform"><Plus size={12} /> 新增行程</button>
                </div>
                <div className="space-y-3 pb-8 relative">
                   <div className="absolute left-[34px] top-6 bottom-6 w-[1px] bg-[#E5E2D0]"></div>
                   {itineraryData[selectedDay]?.events?.map((item, idx) => (
                     <div key={idx} className="flex flex-col gap-2 relative">
                        <div className="flex items-center gap-3">
                          <div className="z-10 bg-[#F5F4EA] py-1"><div className="w-2.5 h-2.5 rounded-full border-[2.5px] border-white shadow-sm" style={{ backgroundColor: item.color }}></div></div>
                          <div onClick={() => setExpandedItem(expandedItem === idx ? null : idx)} className="flex-1 bg-white rounded-[1.5rem] px-4 py-4 shadow-sm flex justify-between items-center active:bg-slate-50 transition-all border border-white">
                            <div className="flex items-center gap-3"><GripVertical size={16} className="text-[#D1CFBC]" /><span className="text-xs font-black text-[#4A4439] w-10">{item.time}</span><div className="w-[1px] h-3 bg-[#F2F1E8]"></div><div><span className="text-[9px] font-bold text-[#A69E83] block uppercase mb-0.5">{item.type}</span><h4 className="text-[13px] font-black text-[#4A4439] tracking-tight">{item.title}</h4></div></div><ChevronDown size={14} className={`text-[#D1CFBC] transition-transform ${expandedItem === idx ? 'rotate-180' : ''}`} />
                          </div>
                        </div>
                     </div>
                   ))}
                </div>
              </div>
            )}

            {activeTab === 'wallet' && (
              <div className="space-y-5 animate-in fade-in duration-300">
                 <div className="bg-[#F1C40F] rounded-[2.5rem] p-7 text-white shadow-lg relative overflow-hidden">
                   <div className="relative z-10">
                     <span className="text-[10px] font-black tracking-widest bg-black/10 px-3 py-1 rounded-full uppercase">Total Expenses</span>
                     <div className="flex items-baseline gap-2 mt-4"><span className="text-sm font-bold opacity-90">NT$</span><h2 className="text-4xl font-black tracking-tighter">{(totalYen * exchangeRate).toLocaleString(undefined, {maximumFractionDigits:0})}</h2></div>
                     <div className="mt-2 flex items-center gap-2 opacity-80 text-[11px] font-bold"><RefreshCw size={12} /><span>累積支出：¥ {totalYen.toLocaleString()}</span></div>
                   </div>
                   <div className="absolute -right-6 -bottom-6 opacity-20 rotate-12"><Wallet size={120}/></div>
                </div>
                <div className="flex bg-white/50 p-1 rounded-2xl border border-white shadow-sm">
                  <button onClick={() => setWalletSubTab('details')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-black transition-all ${walletSubTab === 'details' ? 'bg-[#8BA68D] text-white shadow-md' : 'text-[#A69E83]'}`}><List size={16} /> 消費明細</button>
                  <button onClick={() => setWalletSubTab('stats')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-black transition-all ${walletSubTab === 'stats' ? 'bg-[#8BA68D] text-white shadow-md' : 'text-[#A69E83]'}`}><PieChart size={16} /> 代付統計</button>
                </div>
                {walletSubTab === 'details' && (
                   <div className="space-y-3 pb-8">
                     <div className="flex justify-end pr-2"><button onClick={() => setShowAddExpense(true)} className="flex items-center gap-1.5 bg-[#8BA68D] text-white px-3 py-1.5 rounded-full text-[11px] font-bold shadow-sm hover:scale-105 transition-transform"><Plus size={12} /> 新增支出</button></div>
                     {expenses.map((item) => (
                       <div key={item.id} className="bg-white rounded-[1.8rem] p-4 border border-white shadow-sm flex justify-between items-center">
                         <div className="flex items-center gap-3"><CatAvatar type={members.find(m => m.id === item.userId)?.avatar} size={42} /><div><p className="text-[13px] font-black text-[#4A4439]">{item.name}</p><p className="text-[10px] font-bold text-[#A69E83]">{item.date}</p></div></div>
                         <div className="text-right"><p className="text-sm font-black text-[#4A4439]">¥ {item.amount.toLocaleString()}</p></div>
                       </div>
                     ))}
                   </div>
                )}
              </div>
            )}

            {activeTab === 'members' && (
              <div className="space-y-6 animate-in fade-in duration-300 pb-8">
                <div className="bg-[#8BA68D] rounded-[2.5rem] p-8 text-white text-center"><h3 className="text-2xl font-black mb-1">同行旅伴</h3><p className="text-[11px] font-bold opacity-80">放飛小組共 {members.length} 人</p></div>
                <div className="grid grid-cols-2 gap-4">
                  {members.map((m) => (<div key={m.id} className="bg-white rounded-[2.5rem] p-6 flex flex-col items-center border border-white shadow-sm"><CatAvatar type={m.avatar} size={75} /><h5 className="font-black mt-4 text-[15px] text-[#4A4439]">{m.name}</h5></div>))}
                </div>
                {/* 備份按鈕 */}
                <div className="bg-white rounded-[2rem] p-6 border border-[#8BA68D]/20 shadow-sm flex flex-col items-center gap-3">
                   <h4 className="text-sm font-black">資料安全中心</h4>
                   <p className="text-[10px] text-[#A69E83] text-center">建議每天晚上將行程備份一次，<br/>下載的檔案可以傳到 LINE 群組存檔。</p>
                   <button onClick={exportBackup} className="flex items-center gap-2 bg-[#8BA68D] text-white px-6 py-3 rounded-2xl text-xs font-black shadow-md active:scale-95 transition-all"><Download size={16}/> 立即下載資料備份 (JSON)</button>
                </div>
              </div>
            )}
          </main>

          {/* 新增表單 Modals (簡略版) */}
          {showAddEvent && (
            <div className="fixed inset-0 bg-[#5C5446]/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
               <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-xl">
                 <div className="flex justify-between items-center mb-5"><h3 className="font-black">新增行程</h3><button onClick={() => setShowAddEvent(false)}><X size={16}/></button></div>
                 <div className="space-y-4">
                    <input type="time" value={newEvent.time} onChange={e => setNewEvent({...newEvent, time: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold" />
                    <input type="text" placeholder="行程名稱" value={newEvent.title} onChange={e => setNewEvent({...newEvent, title: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold" />
                    <select value={newEvent.type} onChange={e => setNewEvent({...newEvent, type: e.target.value})} className="w-full bg-[#F5F4EA] border-none rounded-xl py-2 px-3 text-sm font-bold"><option value="景點">景點</option><option value="美食">美食</option><option value="交通">交通</option></select>
                    <button onClick={handleAddEvent} className="w-full bg-[#8BA68D] text-white font-black py-3 rounded-xl mt-2">確認新增</button>
                 </div>
               </div>
            </div>
          )}

          <nav className="fixed bottom-4 left-4 right-4 bg-white/95 backdrop-blur-md rounded-[2.5rem] px-6 py-3 flex justify-between items-center shadow-xl border border-white/50 max-w-[calc(448px-2rem)] mx-auto z-[100]">
            <NavBtn icon={<Calendar size={20}/>} label="行程" active={activeTab === 'itinerary'} onClick={() => setActiveTab('itinerary')} />
            <NavBtn icon={<Wallet size={20}/>} label="記帳" active={activeTab === 'wallet'} onClick={() => setActiveTab('wallet')} />
            <NavBtn icon={<Users size={20}/>} label="成員" active={activeTab === 'members'} onClick={() => setActiveTab('members')} />
          </nav>
        </div>
      );
    }

    const NavBtn = ({ icon, label, active, onClick }) => (
      <button onClick={onClick} className={`flex flex-col items-center gap-1.5 p-1 transition-all duration-300 ${active ? 'text-[#8BA68D] scale-110' : 'text-[#A69E83] opacity-70'}`}>
        <div className={`p-1.5 rounded-xl ${active ? 'bg-[#8BA68D]/10' : ''}`}>{icon}</div>
        <span className="text-[10px] font-black">{label}</span>
      </button>
    );

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
